name: bakvakum

services:
  web:
    build:
      context: ../../web
      dockerfile: Dockerfile.dev

    image: bakvakum-web:dev

    restart: unless-stopped

    ports:
      - "5173:5173"

    volumes:
      - ../../web:/app
      - web_node_modules:/app/node_modules

    env_file:
      - ../env/development.env

    depends_on:
      backend:
        condition: service_started

    networks:
      - bakvakum-network

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.dev

    image: bakvakum-backend:dev

    restart: unless-stopped

    ports:
      - "5000:5000"

    volumes:
      - ../../backend:/app
      - backend_node_modules:/app/node_modules

    env_file:
      - ../env/development.env

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    networks:
      - bakvakum-network

  postgres:
    image: postgres:17-alpine

    restart: unless-stopped

    ports:
      - "5432:5432"

    env_file:
      - ../env/development.env

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - bakvakum-network

  redis:
    image: redis:8-alpine

    restart: unless-stopped

    ports:
      - "6379:6379"

    command: ["redis-server", "--appendonly", "yes"]

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - bakvakum-network

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
  backend_node_modules:

networks:
  bakvakum-network:
    driver: bridge
